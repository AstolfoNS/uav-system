<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }} Explorer</title>
    <style>
        :root {
            /* 极简高对比度配色 */
            --text-main: #1a1a1a;
            --text-muted: #64748b;
            --line-color: #e2e8f0;
            --folder: #b45309;  /* 琥珀色 */
            --param: #be185d;   /* 玫红色 */
            --accent: #6366f1;  /* 靛蓝色 */
        }

        body {
            background: transparent;
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1100px; /* 稍微加宽一点，给长路径留空间 */
            width: 100%;
            background: #FAFAFA; /* 你选用的灰白色 */
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow:
                    0 4px 6px -1px rgba(0, 0, 0, 0.05),
                    0 10px 15px -3px rgba(0, 0, 0, 0.03);
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        /* 头部设计 */
        .header {
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .header p { margin: 8px 0 0; font-size: 14px; color: var(--text-muted); }

        /* 控制按钮 */
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .controls button {
            background: #fff;
            border: 1px solid var(--line-color);
            color: var(--text-muted);
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .controls button:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        /* 搜索框 */
        .search-container { margin-bottom: 30px; }
        #routeSearch {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--line-color);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.02);
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        #routeSearch:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        /* 内容区域滚动 */
        .content {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 10px;
            scroll-behavior: smooth;
        }

        /* 树形逻辑布局 */
        .tree-leaf { margin: 2px 0; }

        summary {
            list-style: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }
        summary::-webkit-details-marker { display: none; }
        summary:hover { background: rgba(0, 0, 0, 0.03); }

        .tree-leaf {
            padding: 8px 12px 8px 12px;
            display: flex;
            align-items: center;
            border-radius: 8px;
        }
        .tree-leaf:hover { background: rgba(0, 0, 0, 0.03); }

        /* 展开箭头 */
        .icon::before {
            content: '▶';
            display: inline-block;
            width: 20px;
            font-size: 10px;
            color: #94a3b8;
            transition: transform 0.2s;
        }
        details[open] > summary > .icon::before { transform: rotate(90deg); }
        .icon-leaf { display: inline-block; width: 20px; }

        /* 修改 CSS 中的 subtree */
        .subtree {
            margin-left: 10px; /* 缩进距离 */
            padding-left: 15px;
            border-left: 1px solid var(--line-color); /* 垂直引导线 */
        }

        /* 根节点特殊样式：更大、不缩进 */
        .root-node {
            font-size: 18px;
            font-weight: 900;
            color: var(--text-main);
        }

        /* 移除第一层根节点的左边框，让它顶格显示 */
        .content > details > .subtree {
            border-left: none;
            margin-left: 5px;
        }

        /* 文字样式 */
        .folder { color: var(--folder); font-weight: 700; margin-right: 8px; }
        .param { color: var(--param); font-style: italic; margin-right: 8px; font-weight: 600; }

        /* 模块标签 - 自动靠右 */
        .module {
            margin-left: auto;
            color: var(--accent);
            background: rgba(99, 102, 241, 0.08);
            padding: 2px 10px;
            border-radius: 5px;
            font-weight: 800;
            font-size: 12px;
            white-space: nowrap;
        }

        /* HTTP 方法勋章 */
        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 5px;
            margin-left: 8px;
            font-weight: 800;
            background: currentColor;
            color: #fff !important;
            border: none;
            min-width: 50px;
            text-align: center;
            filter: brightness(1.05);
            display: inline-block;
        }
        .badge-get { background-color: #0369a1 !important; }    /* 深蓝 */
        .badge-post { background-color: #c2410c !important; }   /* 深橙 */
        .badge-put { background-color: #047857 !important; }    /* 绿色 */
        .badge-delete { background-color: #be123c !important; } /* 红色 */
        .badge-patch { background-color: #7c3aed !important; }  /* 紫色 */
        .badge-other { background-color: #64748b !important; }  /* 灰色 */

        /* 页脚 */
        .footer {
            margin-top: 40px;
            border-top: 1px solid var(--line-color);
            padding-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status { display: flex; align-items: center; font-size: 13px; font-weight: 700; color: #16a34a; }
        .status::before { content: '●'; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .links a {
            color: #0369a1;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .links a:hover { text-decoration: underline; }

        /* 滚动条美化 */
        .content::-webkit-scrollbar { width: 5px; }
        .content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>{{ project_name }}</h1>
        <p>Environment: <b>{{ env }}</b> | Version: <b>{{ version }}</b></p>
    </div>

    <div class="controls">
        <button onclick="toggleAll(true)">全部展开</button>
        <button onclick="toggleAll(false)">全部收起</button>
    </div>

    <div class="search-container">
        <input type="text" id="routeSearch" placeholder="🔍 搜索路由路径或模块名称..." onkeyup="filterRoutes()">
    </div>

    <div class="content" id="treeContent">
        {{ tree_lines | safe }}
    </div>

    <div class="footer">
        <div class="status">SYSTEM ONLINE</div>
        <div class="links">
            <a href="/docs" target="_blank">Swagger UI</a>
            <a href="/redoc" target="_blank">ReDoc</a>
        </div>
    </div>
</div>

<script>
    function filterRoutes() {
        const input = document.getElementById('routeSearch').value.toLowerCase();
        const nodes = document.querySelectorAll('.tree-node, .tree-leaf');

        nodes.forEach(node => {
            const text = node.innerText.toLowerCase();
            const isMatch = text.includes(input);

            // 处理显示/隐藏
            node.style.display = isMatch ? "" : "none";

            // 如果匹配成功，展开所有父级容器
            if (input.length > 0 && isMatch) {
                let parent = node.parentElement.closest('details');
                while (parent) {
                    parent.open = true;
                    parent.style.display = ""; // 确保父容器也是显示的
                    parent = parent.parentElement.closest('details');
                }
            }
        });
    }

    function toggleAll(isOpen) {
        document.querySelectorAll('details').forEach(d => {
            d.open = isOpen;
        });
    }
</script>

</body>
</html>
