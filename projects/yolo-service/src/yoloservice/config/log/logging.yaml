version: 1
disable_existing_loggers: false
formatters:
  console:
    "()": "colorlog.ColoredFormatter"
    format: "%(asctime)s.%(msecs)03d %(log_color)s%(levelname)5s%(reset)s --- [%(process)5d] [%(threadName)15s] %(name)-20s : %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
    log_colors:
      DEBUG:    "cyan"
      INFO:     "green"
      WARNING:  "yellow"
      ERROR:    "red"
      CRITICAL: "bold_red"
  file:
    format: "%(asctime)s.%(msecs)03d %(levelname)5s --- [%(threadName)15s] %(name)-25s [%(filename)20s:%(lineno)-4d] : %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: "logging.StreamHandler"
    level: "{LOG_LEVEL}"
    formatter: "console"
    stream: "ext://sys.stdout"
  file:
    class: "logging.handlers.TimedRotatingFileHandler"
    level: "{LOG_LEVEL}"
    formatter: "file"
    filename: "{LOG_FILE_PATH}"
    when: "midnight"      # 每天午夜切割
    interval: 1           # 间隔1天
    backupCount: {LOG_BACKUP_COUNT}
    encoding: "utf-8"
    delay: true           # 延迟创建文件，直到有日志产生
loggers:
  # 业务代码日志
  yoloservice:
    level: "{LOG_LEVEL}"
    propagate: false
    handlers: ["console", "file"]
  # Web 服务器日志
  uvicorn:
    level: "INFO"
    propagate: false
    handlers: ["console", "file"]
  uvicorn.access:
    level: "INFO"
    propagate: false
    handlers: ["console", "file"]
  sqlalchemy.engine:
    level: "WARNING"
    propagate: false
    handlers: ["console", "file"]
root:
  level: "{LOG_LEVEL}"
  handlers: ["console", "file"]
